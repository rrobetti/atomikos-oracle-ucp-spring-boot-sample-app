# Atomikos configuration overrides for integration tests.
#
# Disable file-based transaction logging so Atomikos does not attempt to
# recover in-doubt XA transactions on startup.  This avoids the need for
# Oracle XA recovery privileges (SELECT on sys.dba_pending_transactions, etc.)
# inside the Testcontainers Oracle container.
#
# Do NOT use enable_logging=false in production; the transaction log is
# required for crash recovery and XA indoubt-transaction resolution.
com.atomikos.icatch.enable_logging=false
