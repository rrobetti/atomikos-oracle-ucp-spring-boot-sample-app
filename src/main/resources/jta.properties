# -----------------------------------------------------------------------
# Atomikos transaction-log configuration
#
# Atomikos writes transaction log files for crash recovery.  In a
# production setup these must survive restarts (durable storage).
# In tests /tmp is sufficient.
# -----------------------------------------------------------------------
com.atomikos.icatch.log_base_dir=/tmp/atomikos-logs
com.atomikos.icatch.output_dir=/tmp/atomikos-logs
com.atomikos.icatch.console_log_level=WARN
# Disable the automatic registration with a JMX server in test environments.
com.atomikos.icatch.enable_logging=true
